<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f2ea" />
      <stop offset="1" stop-color="#e7dccb" />
    </linearGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#d4c5b5" />
    </pattern>
  </defs>
  <rect width="960" height="720" fill="url(#bg)" />
  <rect x="120" y="110" width="720" height="500" rx="52" fill="#ffffff" stroke="#2a2926" stroke-opacity="0.18" stroke-width="3" />
  <rect x="160" y="160" width="640" height="400" rx="36" fill="url(#dots)" />
  <text x="160" y="585" font-size="28" font-family="Manrope, Arial, sans-serif" fill="#2a2926" opacity="0.8">Notebook Dot Grid</text>
</svg>
